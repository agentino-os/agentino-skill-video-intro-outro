metadata:
  name: video-intro-outro
  version: "1.0.0"
  description: "Prepend an intro clip and/or append an outro clip to an existing video, with a smooth crossfade at every join. Auto-normalises resolution / fps / codec so branded intros shot at different specs slot in cleanly."
  author: Agentino
  tags:
    - video
    - media
    - intro
    - outro
    - branding
    - ffmpeg
    - marketplace
  license: MIT
  homepage: https://github.com/agentino/agentino

spec:
  input:
    - name: video_path
      type: string
      description: "Absolute path to the main video."
      required: true
    - name: intro_path
      type: string
      description: "Optional clip to prepend. Will be normalised to match main video resolution/fps."
      required: false
      default: ""
    - name: outro_path
      type: string
      description: "Optional clip to append. Will be normalised to match main video resolution/fps."
      required: false
      default: ""
    - name: output_path
      type: string
      description: "Destination MP4. Defaults to '<video>.branded.<ext>' next to the source."
      required: false
      default: ""
    - name: fade_s
      type: number
      description: "Length of the video+audio crossfade at every join (between intro→main and main→outro). 0 = hard cuts."
      required: false
      default: 0.5
    - name: resolution
      type: string
      description: "Output resolution WxH. Defaults to the main video's dimensions."
      required: false
      default: ""
    - name: fps
      type: integer
      description: "Output frame rate. Defaults to the main video's fps."
      required: false
      default: 0
    - name: bg_color
      type: string
      description: "Letterbox colour when aspect ratios mismatch."
      required: false
      default: "black"

  output:
    type: object
    description: "Render summary: output_path, intro_duration_s, main_duration_s, outro_duration_s, output_duration_s, resolution, fps, fade_s."

  security:
    sandbox_level: none
    network_access: false
    file_access: read-write

  timeout_s: 900.0

  executor:
    type: python
    code: |
      import shutil
      import subprocess
      import tempfile
      from pathlib import Path

      def _which(cmd):
          p = shutil.which(cmd)
          if not p:
              raise RuntimeError(f"'{cmd}' not found on PATH. Install ffmpeg (brew/apt).")
          return p

      def _probe(path):
          ffprobe = _which("ffprobe")
          r = subprocess.run(
              [ffprobe, "-v", "error", "-select_streams", "v:0",
               "-show_entries", "stream=width,height,r_frame_rate:format=duration",
               "-of", "default=noprint_wrappers=1", str(path)],
              check=True, capture_output=True, text=True, timeout=30,
          )
          info = {}
          for line in r.stdout.strip().splitlines():
              if "=" in line:
                  k, v = line.split("=", 1)
                  info[k.strip()] = v.strip()
          w = int(info.get("width") or 0)
          h = int(info.get("height") or 0)
          fr_raw = info.get("r_frame_rate") or "30/1"
          try:
              num, den = fr_raw.split("/")
              fps = float(num) / float(den) if float(den) else float(num)
          except (ValueError, ZeroDivisionError):
              fps = 30.0
          dur = float(info.get("duration") or 0)
          return w, h, fps, dur

      video_path = Path(str(input.get("video_path") or "")).expanduser().resolve()
      if not video_path.is_file():
          raise FileNotFoundError(f"video_path not found: {video_path}")

      intro_raw = (input.get("intro_path") or "").strip()
      outro_raw = (input.get("outro_path") or "").strip()
      if not intro_raw and not outro_raw:
          raise ValueError("At least one of intro_path or outro_path must be supplied — otherwise this skill is a no-op.")

      intro_path = None
      outro_path = None
      if intro_raw:
          intro_path = Path(intro_raw).expanduser().resolve()
          if not intro_path.is_file():
              raise FileNotFoundError(f"intro_path not found: {intro_path}")
      if outro_raw:
          outro_path = Path(outro_raw).expanduser().resolve()
          if not outro_path.is_file():
              raise FileNotFoundError(f"outro_path not found: {outro_path}")

      requested_out = (input.get("output_path") or "").strip()
      if requested_out:
          output_path = Path(requested_out).expanduser().resolve()
          output_path.parent.mkdir(parents=True, exist_ok=True)
      else:
          stem = video_path.stem
          ext = video_path.suffix or ".mp4"
          output_path = video_path.with_name(f"{stem}.branded{ext}")
      if output_path.suffix.lower() != ".mp4":
          output_path = output_path.with_suffix(".mp4")

      fade_s = max(0.0, float(input.get("fade_s") or 0.0))
      bg_color = (input.get("bg_color") or "black").strip()

      main_w, main_h, main_fps, main_dur = _probe(video_path)
      resolution = (input.get("resolution") or "").strip().lower()
      if resolution:
          if "x" not in resolution:
              raise ValueError("resolution must be WxH, e.g. '1920x1080'.")
          out_w, out_h = (int(x) for x in resolution.split("x", 1))
      else:
          out_w, out_h = main_w, main_h

      raw_fps = input.get("fps") or 0
      fps = int(raw_fps) if int(raw_fps) > 0 else int(round(main_fps))

      # Ordered list: [intro?, main, outro?]
      clips = []
      if intro_path is not None:
          clips.append(intro_path)
      clips.append(video_path)
      if outro_path is not None:
          clips.append(outro_path)

      durations = []
      for c in clips:
          _, _, _, d = _probe(c)
          durations.append(d)

      n = len(clips)
      # Safety: every clip must exceed the fade length (can't xfade over a clip shorter than the fade).
      if fade_s > 0:
          for i, d in enumerate(durations):
              if d <= fade_s + 0.05:
                  raise ValueError(
                      f"clip {i} ({clips[i].name}) is {d:.2f}s, shorter than fade_s={fade_s}. "
                      "Shorten fade_s or use a longer intro/outro."
                  )

      filters = []
      for i in range(n):
          filters.append(
              f"[{i}:v]format=rgba,"
              f"scale={out_w}:{out_h}:force_original_aspect_ratio=decrease,"
              f"pad={out_w}:{out_h}:(ow-iw)/2:(oh-ih)/2:color={bg_color},"
              f"setsar=1,fps={fps},setpts=PTS-STARTPTS[v{i}]"
          )
          filters.append(f"[{i}:a]aresample=async=1:first_pts=0,asetpts=PTS-STARTPTS[a{i}]")

      if fade_s <= 0:
          concat_in = "".join(f"[v{i}][a{i}]" for i in range(n))
          filters.append(f"{concat_in}concat=n={n}:v=1:a=1[vout][aout]")
          final_v = "vout"
          final_a = "aout"
      else:
          prev_v, prev_a = "v0", "a0"
          acc = durations[0]
          for i in range(1, n):
              offset = acc - fade_s
              nv = f"vx{i}"
              na = f"ax{i}"
              filters.append(
                  f"[{prev_v}][v{i}]xfade=transition=fade:duration={fade_s}:offset={offset}[{nv}]"
              )
              filters.append(
                  f"[{prev_a}][a{i}]acrossfade=d={fade_s}[{na}]"
              )
              prev_v, prev_a = nv, na
              acc += durations[i] - fade_s
          final_v, final_a = prev_v, prev_a

      filter_complex = ";".join(filters)

      ffmpeg = _which("ffmpeg")
      cmd = [ffmpeg, "-y", "-hide_banner", "-loglevel", "error"]
      for c in clips:
          cmd += ["-i", str(c)]
      cmd += [
          "-filter_complex", filter_complex,
          "-map", f"[{final_v}]",
          "-map", f"[{final_a}]",
          "-c:v", "libx264", "-preset", "medium", "-crf", "20",
          "-pix_fmt", "yuv420p", "-r", str(fps),
          "-c:a", "aac", "-b:a", "192k",
          "-movflags", "+faststart",
          str(output_path),
      ]
      subprocess.run(cmd, check=True, capture_output=True, text=True, timeout=1800)

      _, _, _, actual_dur = _probe(output_path)

      result = {
          "output_path": str(output_path),
          "intro_duration_s": round(durations[0], 3) if intro_path else 0.0,
          "main_duration_s": round(main_dur, 3),
          "outro_duration_s": round(durations[-1], 3) if outro_path else 0.0,
          "output_duration_s": round(actual_dur, 3),
          "resolution": f"{out_w}x{out_h}",
          "fps": fps,
          "fade_s": fade_s,
          "intro_present": intro_path is not None,
          "outro_present": outro_path is not None,
      }
